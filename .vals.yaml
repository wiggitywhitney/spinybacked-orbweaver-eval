# Secrets configuration for vals
# https://github.com/helmfile/vals
#
# Usage:
#   vals eval -f .vals.yaml              # Show resolved values
#   vals exec -f .vals.yaml -- command   # Run command with secrets injected
#
# For MCP servers that need secrets (like CodeRabbit), export before starting Claude Code:
#   eval $(vals eval -f .vals.yaml --output shell)

ANTHROPIC_API_KEY: ref+gcpsecrets://demoo-ooclock/anthropic-api-key
GITHUB_TOKEN: ref+gcpsecrets://demoo-ooclock/github-token
# Fine-grained PAT scoped to wiggitywhitney/taze with contents:write and pull_requests:write.
# Use for taze eval runs: bash -c 'GITHUB_TOKEN=$GITHUB_TOKEN_TAZE node .../spiny-orb.js ...'
GITHUB_TOKEN_TAZE: ref+gcpsecrets://demoo-ooclock/github-token-taze

# Datadog credentials for OTLP export (Phase 2/3 - telemetry agent)
DD_API_KEY: ref+gcpsecrets://demoo-ooclock/datadog-commit-story-dev
DD_APP_KEY: ref+gcpsecrets://demoo-ooclock/datadog-commit-story-app
